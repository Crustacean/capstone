apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: uat
resources:
  - ../base
replicas:
  - name: release-dashboard
    count: 2
patches:
  - target:
      kind: HorizontalPodAutoscaler
      name: release-dashboard
    patch: |-
      - op: replace
        path: /spec/maxReplicas
        value: 6
