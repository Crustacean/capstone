apiVersion: apps/v1
kind: Deployment
metadata:
  name: release-dashboard
  labels:
    app: release-dashboard
spec:
  replicas: 2
  selector:
    matchLabels:
      app: release-dashboard
  template:
    metadata:
      labels:
        app: release-dashboard
    spec:
      containers:
        - name: app
          image: $IMAGE_NAME:$IMAGE_TAG
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            - name: RELEASE_DASHBOARD_DB
              value: /data/release_dashboard.db
            - name: APP_VERSION
              value: "$IMAGE_TAG"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          emptyDir: {}
